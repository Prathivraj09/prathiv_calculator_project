<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calc-box">
        <div class="screen">
            <div id="upper-screen" class="history"></div>
            <div id="main-screen" class="current">0</div>
        </div>

        <div class="button-container">
            <button class="btn btn-red" onclick="allClear()">AC</button>
            <button class="btn btn-gray" onclick="deleteLast()">DEL</button>
            <button class="btn btn-gray" onclick="setOperator('%')">%</button>
            <button class="btn btn-op" onclick="setOperator('/')">÷</button>
            
            <button class="btn" onclick="appendNumber('7')">7</button>
            <button class="btn" onclick="appendNumber('8')">8</button>
            <button class="btn" onclick="appendNumber('9')">9</button>
            <button class="btn btn-op" onclick="setOperator('*')">×</button>
            
            <button class="btn" onclick="appendNumber('4')">4</button>
            <button class="btn" onclick="appendNumber('5')">5</button>
            <button class="btn" onclick="appendNumber('6')">6</button>
            <button class="btn btn-op" onclick="setOperator('-')">−</button>
            
            <button class="btn" onclick="appendNumber('1')">1</button>
            <button class="btn" onclick="appendNumber('2')">2</button>
            <button class="btn" onclick="appendNumber('3')">3</button>
            <button class="btn btn-op" onclick="setOperator('+')">+</button>
            
            <button class="btn span-two" onclick="appendNumber('0')">0</button>
            <button class="btn" onclick="appendNumber('.')">.</button>
            <button class="btn btn-blue" onclick="calculate()">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
